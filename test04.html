<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单 </title>
</head>
<body>
    <form action="">
        text:<input type="text" name="text" placeholder="Texting..."><br>
        password:<input type="password" name="password" placeholder="请输入你的密码..."><br>
        <label><input type="checkbox" name="checkbox">checkbox1</label>
        <label><input type="checkbox" name="checkbox">checkbox2</label>
        <label><input type="checkbox" name="checkbox">checkbox3</label>
        <label><input type="checkbox" name="checkbox">checkbox4</label><br>
        <label><input type="radio" name="radio">radio1</label>
        <label><input type="radio" name="radio">radio2</label><br>
        <!-- submit:<input type="submit" name="submit"><br>
        reset:<input type="reset" name="reset"><br> -->
        file:<input type="file" name="file"><br>
        multiple files:<input type="file" name="files" multiple><br>
        select:<select name="dropdown" id="dropdown">
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select><br>
        <textarea name="" id="" placeholder="114514ing..."></textarea><br>
        <button type="button">Click Me!</button>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <div>这是div标签，大盒子，独占一行</div>
    <span>这是span标签，小盒子，不独占一行</span>
</body>
</html>
