<body>

    <p id="green">on css id</p>

    <div class="redbox100px">div</div>
    <div class="orangebox200px">div</div>
    <!-- 字体控制相关 -->

    <!-- font-style 控制字体样式，正常normal，斜体italic --> 
    <!-- line-height 控制行高 数字+px为直接设置 只用数字代表几倍行距 -->
