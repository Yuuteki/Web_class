<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <ul>
    <li>list item 1</li>
    <li>list item 2</li>
    <li>list item 3</li>
    </ul>
    <ol>
    <li>list item 1</li>
    <li>list item 2</li>
    <li>list item 3</li>
    </ol>
    <dl>
        <dt>Term 1</dt>
        <dd>Description 11</dd>
        <dd>Description 12</dd>
        <dt>Term 2</dt>
        <dd>Description 21</dd> 
        <dd>Description 22</dd>
    </dl>
    <table border="1">
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
            <th>Header 3</th>
        </tr>
        <tr>
            <td>Row 1, Cell 1</td>
            <td>Row 1, Cell 2</td>
            <td>Row 1, Cell 3</td>
        </tr>
        <tr>
            <td>Row 2, Cell 1</td>
            <td>Row 2, Cell 2</td>
            <td>Row 2, Cell 3</td>
        </tr>
    </table>
    
</body>
</html>
